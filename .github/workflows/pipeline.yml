name: Wellness Tourism MLOps Pipeline

on:
  push:
    branches:
      - main  # Automatically triggers on push to the main branch

jobs:
  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install -r deployment/requirements.txt
      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python mls10-wellness_tourism_mlops/model_building/data_register.py

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install -r deployment/requirements.txt
      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python mls10-wellness_tourism_mlops/model_building/prep.py
      # We upload the data folder so 'train' job can use the split files
      - name: Upload Prepared Data
        uses: actions/upload-artifact@v4
        with:
          name: prepared-data
          path: mls10-wellness_tourism_mlops/data/

  model-training:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install -r /deployment/requirements.txt
      - name: Download Prepared Data
        uses: actions/download-artifact@v4
        with:
          name: prepared-data
          path: mls10-wellness_tourism_mlops/data/
      - name: Run Model Training
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # We run MLflow in local file mode for the runner
        run: |
          mkdir -p mlruns
          python mls10-wellness_tourism_mlops/model_building/train.py
      # Optional: Upload MLflow logs as an artifact to view locally later
      - name: Upload MLflow Results
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-logs
          path: mlruns/

  deploy-hosting:
    runs-on: ubuntu-latest
    needs: [model-training,data-prep,register-dataset]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install -r mls10-wellness_tourism_mlops/deployment/requirements.txt
      - name: Push files to Frontend Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python mls10-wellness_tourism_mlops/hosting/hosting.py
